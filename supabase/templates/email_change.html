<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>Shallet メールアドレス変更の確認</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f7f4ea;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f4ea;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;width:100%;">
            <!-- ヘッダー（ワードマーク） -->
            <tr>
              <td align="center" style="padding:8px 0 20px 0;">
                <span style="font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.02em;color:#2f7d57;">Shallet</span>
              </td>
            </tr>
            <!-- カード -->
            <tr>
              <td style="background-color:#ffffff;border:1px solid #e6e2d6;border-radius:16px;padding:36px 32px;">
                <h1 style="margin:0 0 16px 0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:20px;font-weight:700;color:#1f2a24;">メールアドレスの変更</h1>
                <p style="margin:0 0 24px 0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:15px;line-height:1.8;color:#1f2a24;">
                  メールアドレス変更のリクエストを受け付けました。下のボタンから新しいメールアドレスを確認すると、変更が完了します。
                </p>
                <!-- CTA -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 24px 0;">
                  <tr>
                    <td align="center" bgcolor="#2f7d57" style="border-radius:10px;">
                      <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:13px 28px;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:10px;">新しいメールアドレスを確認する</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0 0 8px 0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px;line-height:1.7;color:#6b7763;">
                  ボタンが押せない場合は、以下のURLをブラウザに貼り付けてください。
                </p>
                <p style="margin:0 0 24px 0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px;line-height:1.6;color:#6b7763;word-break:break-all;">
                  <a href="{{ .ConfirmationURL }}" target="_blank" style="color:#2f7d57;text-decoration:underline;">{{ .ConfirmationURL }}</a>
                </p>
                <hr style="border:none;border-top:1px solid #e6e2d6;margin:0 0 16px 0;" />
                <p style="margin:0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px;line-height:1.7;color:#6b7763;">
                  このメールに心当たりが無い場合は、操作は不要です。
                </p>
              </td>
            </tr>
            <!-- フッター -->
            <tr>
              <td align="center" style="padding:20px 0 8px 0;">
                <p style="margin:0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px;line-height:1.6;color:#6b7763;">
                  Shallet — 家計を、みんなで一緒に。
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
